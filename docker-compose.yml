version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - TIMEZONE=${TIMEZONE:-Europe/Paris}
      - DATABASE_URL=sqlite:///data/lifelog.db
    volumes:
      - lifelog_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  lifelog_data: